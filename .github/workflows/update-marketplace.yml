name: 🎪 Update Marketplace on Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.1, v1.0.2

jobs:
  update-marketplace:
    name: Update Claude Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout Plugin Repository
        uses: actions/checkout@v4

      - name: 📝 Extract Version from Tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Released version: $VERSION"

      - name: 🎪 Checkout Marketplace Repository
        uses: actions/checkout@v4
        with:
          repository: Mysios-Labs-inc/claude-plugins-marketplace
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: 🔄 Update marketplace.json
        run: |
          cd marketplace

          # Install jq for JSON manipulation
          sudo apt-get update && sudo apt-get install -y jq

          # Update the version and ref in marketplace.json
          jq --arg version "${{ steps.version.outputs.version }}" \
             '.plugins[] |= if .name == "jobseeking-plugin" then .version = $version | .source.ref = $version else . end' \
             .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Verify the update
          echo "Updated marketplace.json:"
          cat .claude-plugin/marketplace.json

      - name: 📝 Update README.md
        run: |
          cd marketplace

          # Update README.md version
          sed -i "s/### 🚀 Jobseeking Plugin v[0-9]\+\.[0-9]\+\.[0-9]\+/### 🚀 Jobseeking Plugin ${{ steps.version.outputs.version }}/" README.md

          # Update features for v1.2+ versions with AI intelligence
          if [[ "${{ steps.version.outputs.version }}" =~ v1\.[2-9] ]]; then
            # Create enhanced features content for v1.2.0+
            cat > /tmp/features.txt << 'EOL'
**Features:**
- 🧠 **AI-Powered Profile Intelligence** - Smart skills gap analysis and career insights
- 🔍 **Smart Document Upload** - Intelligent file detection with 85%+ accuracy
- 📊 **Enhanced Skills Analysis** - Real-time market demand assessment
- 📝 **Achievement Enhancement** - AI-suggested quantification and metrics
- 📄 **Instant Resume Generation** - Job-specific optimization and ATS compatibility
- 📁 **Professional Workspace** - 65+ organized directories with iCloud sync
- 🔐 **Encrypted Profile Storage** - Secure local data with completeness scoring
- 🎯 **Profile-Driven Automation** - Eliminates repetitive data re-entry
EOL
            # Replace features section
            sed -i '/\*\*Features:\*\*/,/^\*\*Installation:\*\*/{ /^\*\*Installation:\*\*/!d; }' README.md
            sed -i '/### 🚀 Jobseeking Plugin/r /tmp/features.txt' README.md

          elif [[ "${{ steps.version.outputs.version }}" =~ v1\.[1-9] ]]; then
            # Enhanced features for v1.1.x
            cat > /tmp/features.txt << 'EOL'
**Features:**
- 🔍 **Smart Document Upload** - Intelligent file detection with 85%+ accuracy
- 📊 **Enhanced PDF Parsing** - Confidence scoring and quality assessment
- 📤 **Multi-Format Support** - PDF, Word, JSON, CSV, and text formats
- ✨ **Quality Validation** - Real-time extraction confidence and data validation
- 📄 **Instant Resume Generation** - Job-specific optimization and ATS compatibility
- 📁 **Professional Workspace** - 65+ organized directories with iCloud sync
- 🔐 **Encrypted Profile Storage** - Secure local data with completeness scoring
- 🎯 **Profile-Driven Automation** - Eliminates repetitive data re-entry
EOL
            # Replace features section
            sed -i '/\*\*Features:\*\*/,/^\*\*Installation:\*\*/{ /^\*\*Installation:\*\*/!d; }' README.md
            sed -i '/### 🚀 Jobseeking Plugin/r /tmp/features.txt' README.md
          fi

          # Clean up temp file
          rm -f /tmp/features.txt

          # Verify the update
          echo "Updated README.md version section:"
          grep -A 12 "Jobseeking Plugin" README.md

      - name: 📤 Commit and Push Marketplace Update
        run: |
          cd marketplace

          # Configure git
          git config user.name "Marketplace Bot"
          git config user.email "bot@mysioslabs.com"

          # Check if there are changes to either file
          if git diff --quiet .claude-plugin/marketplace.json README.md; then
            echo "No changes to marketplace files"
            exit 0
          fi

          # Commit and push changes
          git add .claude-plugin/marketplace.json README.md
          git commit -m "🚀 Auto-update: jobseeking-plugin ${{ steps.version.outputs.version }}

          ✨ Updated Files:
          - marketplace.json: Version bumped to ${{ steps.version.outputs.version }}
          - README.md: Updated version and enhanced feature descriptions
          - Source ref updated to latest release tag
          - Users will receive update notification in Claude Code

          🔗 Release: https://github.com/Mysios-Labs-inc/claude-jobseeking-plugin/releases/tag/${{ steps.version.outputs.version }}

          🤖 Auto-generated by marketplace-update workflow"

          git push origin main

      - name: ✅ Notification
        run: |
          echo "🎉 Successfully updated marketplace!"
          echo "Users can now update to jobseeking-plugin ${{ steps.version.outputs.version }}"
          echo "Marketplace: https://github.com/Mysios-Labs-inc/claude-plugins-marketplace"