name: 🎪 Update Marketplace on Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.1, v1.0.2

jobs:
  update-marketplace:
    name: Update Claude Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: 🛒 Checkout Plugin Repository
        uses: actions/checkout@v4

      - name: 📝 Extract Version from Tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Released version: $VERSION"

      - name: 🎪 Checkout Marketplace Repository
        uses: actions/checkout@v4
        with:
          repository: Mysios-Labs-inc/claude-plugins-marketplace
          token: ${{ secrets.MARKETPLACE_TOKEN }}
          path: marketplace

      - name: 🔄 Update marketplace.json
        run: |
          cd marketplace

          # Install jq for JSON manipulation
          sudo apt-get update && sudo apt-get install -y jq

          # Update the version and ref in marketplace.json
          jq --arg version "${{ steps.version.outputs.version }}" \
             '.plugins[] |= if .name == "jobseeking-plugin" then .version = $version | .source.ref = $version else . end' \
             .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

          # Verify the update
          echo "Updated marketplace.json:"
          cat .claude-plugin/marketplace.json

      - name: 📤 Commit and Push Marketplace Update
        run: |
          cd marketplace

          # Configure git
          git config user.name "Marketplace Bot"
          git config user.email "bot@mysioslabs.com"

          # Check if there are changes
          if git diff --quiet .claude-plugin/marketplace.json; then
            echo "No changes to marketplace.json"
            exit 0
          fi

          # Commit and push changes
          git add .claude-plugin/marketplace.json
          git commit -m "🚀 Auto-update: jobseeking-plugin ${{ steps.version.outputs.version }}

          ✨ Updated Features:
          - Plugin version bumped to ${{ steps.version.outputs.version }}
          - Source ref updated to latest release tag
          - Users will receive update notification in Claude Code

          🔗 Release: https://github.com/Mysios-Labs-inc/claude-jobseeking-plugin/releases/tag/${{ steps.version.outputs.version }}

          🤖 Auto-generated by marketplace-update workflow"

          git push origin main

      - name: ✅ Notification
        run: |
          echo "🎉 Successfully updated marketplace!"
          echo "Users can now update to jobseeking-plugin ${{ steps.version.outputs.version }}"
          echo "Marketplace: https://github.com/Mysios-Labs-inc/claude-plugins-marketplace"